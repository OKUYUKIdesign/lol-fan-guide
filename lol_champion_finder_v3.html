<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Champion Finder</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');
:root{
  --bg:#050810;--panel:#0b1020;--panel2:#0d1428;
  --border:rgba(180,140,60,0.18);--gold:#C8A84B;--gold2:#e8c87a;
  --glow:rgba(200,168,75,0.3);--text:#d8c8a0;--muted:rgba(210,195,160,0.5);--white:#f0e4cc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 70%,rgba(200,168,75,0.03) 0%,transparent 60%),radial-gradient(ellipse 50% 70% at 90% 10%,rgba(74,159,232,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:40px 18px 100px;}

/* HEADER */
.hdr{text-align:center;margin-bottom:48px;animation:fadeD .8s ease both;}
.hdr-eye{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:7px;color:var(--gold);opacity:.7;text-transform:uppercase;margin-bottom:10px;}
.hdr-h1{font-family:'Rajdhani',sans-serif;font-size:clamp(34px,9vw,60px);font-weight:700;color:var(--gold);letter-spacing:4px;text-shadow:0 0 50px var(--glow);line-height:1;}
.hdr-sub{margin-top:14px;font-size:12px;color:var(--muted);line-height:2;}
.gold-hr{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;}

/* ROLE GRID */
#s-role{animation:fadeU .6s ease both;}
.role-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
@media(max-width:480px){.role-grid{grid-template-columns:repeat(3,1fr);}}
.rbtn{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 6px 13px;cursor:pointer;transition:all .22s;text-align:center;color:var(--muted);position:relative;overflow:hidden;}
.rbtn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;}
.rbtn:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(0,0,0,.4);}
.rbtn:hover::before{opacity:1;}
.rbtn .ri{font-size:26px;display:block;margin-bottom:7px;}
.rbtn .rn{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--text);}
.rbtn .rs{font-size:9px;color:var(--muted);margin-top:2px;}
.r-top:hover{border-color:#e8563a;box-shadow:0 0 25px rgba(232,86,58,.2)!important;}
.r-jg:hover{border-color:#4db870;box-shadow:0 0 25px rgba(77,184,112,.2)!important;}
.r-mid:hover{border-color:#4a9fe8;box-shadow:0 0 25px rgba(74,159,232,.2)!important;}
.r-bot:hover{border-color:#e8c43a;box-shadow:0 0 25px rgba(232,196,58,.2)!important;}
.r-sup:hover{border-color:#b04ae8;box-shadow:0 0 25px rgba(176,74,232,.2)!important;}

/* QUIZ */
#s-quiz{display:none;}
#s-quiz.on{display:block;animation:fadeU .5s ease both;}
.qhdr{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.rbadge{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;padding:3px 11px;border-radius:3px;border:1px solid;text-transform:uppercase;}
.qtitle{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.plbl{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);opacity:.7;}
.pbar{background:rgba(200,168,75,.07);height:2px;border-radius:1px;margin-bottom:24px;overflow:hidden;}
.pfill{height:100%;background:var(--gold);transition:width .5s ease;box-shadow:0 0 8px var(--glow);}
.qcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:26px 22px;display:none;animation:slideR .38s ease;}
.qcard.on{display:block;}
.qnum{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold);opacity:.55;margin-bottom:8px;}
.qtxt{font-size:16px;font-weight:700;color:var(--white);line-height:1.7;margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:rgba(255,255,255,.02);border:1px solid rgba(200,168,75,.1);border-radius:7px;padding:12px 15px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;text-align:left;cursor:pointer;transition:all .18s;line-height:1.6;display:flex;align-items:flex-start;gap:11px;}
.opt-e{font-size:17px;flex-shrink:0;margin-top:1px;}
.opt:hover{background:rgba(200,168,75,.07);border-color:var(--gold);color:var(--white);transform:translateX(3px);}
.opt.sel{background:rgba(200,168,75,.1);border-color:var(--gold);color:var(--white);}

/* RESULT */
#s-res{display:none;}
#s-res.on{display:block;animation:fadeU .6s ease both;}
.res-hero{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:34px 26px 26px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.res-eye{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:5px;color:var(--gold);opacity:.65;margin-bottom:10px;}
.res-name{font-family:'Rajdhani',sans-serif;font-size:clamp(30px,8vw,50px);font-weight:700;color:var(--gold);text-shadow:0 0 40px var(--glow);letter-spacing:3px;line-height:1.1;margin-bottom:5px;}
.res-arch{font-size:11px;letter-spacing:3px;color:var(--muted);margin-bottom:20px;}
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.scell{background:rgba(200,168,75,.04);border:1px solid rgba(200,168,75,.1);border-radius:5px;padding:9px 5px;text-align:center;}
.sv{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;color:var(--gold);display:block;}
.sk{font-size:9px;letter-spacing:1px;color:var(--muted);display:block;margin-top:2px;}
.picks{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.pick{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:16px 18px;position:relative;overflow:hidden;}
.pick.top{border-color:rgba(200,168,75,.4);}
.pick.top::after{content:'TOP PICK';position:absolute;top:9px;right:13px;font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:2px;color:var(--gold);opacity:.75;}
.pname{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:5px;}
.pdesc{font-size:12px;color:var(--muted);line-height:1.85;margin-bottom:9px;}
.ptags{display:flex;flex-wrap:wrap;gap:4px;}
.ptag{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:1px;border:1px solid rgba(200,168,75,.28);padding:2px 7px;border-radius:3px;color:rgba(200,168,75,.75);}
.comment{background:rgba(200,168,75,.04);border:1px solid rgba(200,168,75,.13);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;font-size:12px;line-height:1.95;color:var(--muted);margin-bottom:14px;}
.btns{display:flex;gap:9px;}
.btn-s,.btn-p{flex:1;padding:12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn-s{background:transparent;border:1px solid rgba(200,168,75,.38);color:var(--gold);}
.btn-s:hover{background:rgba(200,168,75,.07);box-shadow:0 0 15px var(--glow);}
.btn-p{background:rgba(200,168,75,.1);border:1px solid var(--gold);color:var(--gold);}
.btn-p:hover{background:rgba(200,168,75,.18);box-shadow:0 0 20px var(--glow);}

@keyframes fadeD{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

</style>
</head>
<body>
<div class="wrap">

<header class="hdr">
  <div class="hdr-eye">League of Legends</div>
  <h1 class="hdr-h1">CHAMPION<br>FINDER</h1>
  <div class="gold-hr"></div>
  <p class="hdr-sub">ロールを選んで10問に答えるだけ<br>あなたにぴったりのチャンピオンが見つかる</p>
</header>

<div id="s-role">
  <div class="role-grid">
    <button class="rbtn r-top" id="btn-top"><span class="ri">⚔️</span><div class="rn">TOP</div><div class="rs">トップレーン</div></button>
    <button class="rbtn r-jg"  id="btn-jg"><span class="ri">🌿</span><div class="rn">JG</div><div class="rs">ジャングル</div></button>
    <button class="rbtn r-mid" id="btn-mid"><span class="ri">✨</span><div class="rn">MID</div><div class="rs">ミッドレーン</div></button>
    <button class="rbtn r-bot" id="btn-bot"><span class="ri">🎯</span><div class="rn">BOT</div><div class="rs">ボットレーン</div></button>
    <button class="rbtn r-sup" id="btn-sup"><span class="ri">🛡️</span><div class="rn">SUP</div><div class="rs">サポート</div></button>
  </div>
</div>

<div id="s-quiz" style="display:none">
  <div class="qhdr"><div class="rbadge" id="qbadge"></div><div class="qtitle">チャンプ診断</div></div>
  <div class="prow"><span class="plbl" id="plbl">Q1/10</span><span class="plbl" id="ppct">0%</span></div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div id="qwrap"></div>
</div>

<div id="s-res" style="display:none">
  <div class="res-hero">
    <div class="res-eye">// 診断結果</div>
    <div class="res-name" id="rname">---</div>
    <div class="res-arch" id="rarch">---</div>
    <div class="srow" id="rstats"></div>
  </div>
  <div class="picks" id="rpicks"></div>
  <div class="comment" id="rcomment"></div>
  <div class="btns">
    <button class="btn-s" id="btn-retry">↺ 再診断</button>
    <button class="btn-p" id="btn-top2">▤ ロール選択</button>
  </div>
</div>

</div>

<script>
var TOP={

  qs:[
    {q:'序盤のレーン戦、どんなスタイルが好き？',

    {q:'チームへの貢献スタイルは？',

        {e:'🔥',t:'純粋な火力でゲームを決める',v:'damage'}]}
  ],
  ch:{
    garen:{name:'GAREN',arch:'正義の鎧・万能ジャガーノート',
      st:[{v:'S',k:'SIMPLE'},{v:'A',k:'BULLY'},{v:'A',k:'EARLY'},{v:'B',k:'SCALE'}],
      picks:[
        {name:'ガレン',desc:'Patch26.7ピック率No.1トップ（14%）。シンプルなキットで高い勝率を誇る安定の一枚。QとEのトレードからRの処刑まで流れが直感的。タンクでもファイターでも機能する。',tags:['JUGGERNAUT','SIMPLE','AD','BULLY']},
        {name:'ダリウス',desc:'ガレンと同じく序盤番長スタイル。Rのノクシアン・ギロティンリセットが集団戦で爆発。シルバー帯では相手が対処できないことも多い。',tags:['JUGGERNAUT','BULLY','AD','RESET']}

    darius:{name:'DARIUS',arch:'ノクサス親衛隊・レーン支配者',
      st:[{v:'S',k:'BULLY'},{v:'A',k:'KILL'},{v:'B',k:'SPLIT'},{v:'A',k:'EARLY'}],
      picks:[
        {name:'ダリウス',desc:'出血スタックとRリセットによる集団戦の爆発力が魅力。序盤から圧倒的なプレッシャーで対面を精神的に追い詰めるスタイルが最高に気持ちいい。',tags:['JUGGERNAUT','BULLY','AD','RESET']},
        {name:'レネクトン',desc:'ダリウスより序盤のバーストが高く、Eダッシュで機動力もある。スタン込みのコンボが決まった時の破壊力は序盤最強クラス。',tags:['DIVER','BULLY','AD','EARLY']}

    if(A[4]==='mid'){s.nami+=2;s.lulu+=2;s.milio+=2;s.morgana+=2;s.taric+=2;}
    if(A[4]==='hard'){s.thresh+=3;s.pyke+=2;s.bard+=2;s.renataGlasc+=1;}
    if(A[5]==='hardcc'){s.nautilus+=3;s.blitzcrank+=3;s.thresh+=1;s.leona+=3;s.morgana+=2;}
    if(A[5]==='softcc'){s.lulu+=3;s.nami+=2;s.milio+=2;s.soraka+=1;s.sona+=2;}
    if(A[5]==='damage'){s.pyke+=3;s.thresh+=1;s.xerath+=3;s.sona+=1;}
    if(A[6]==='hook'){s.blitzcrank+=3;s.thresh+=2;s.nautilus+=1;s.morgana+=2;}
    if(A[6]==='save'){s.braum+=3;s.lulu+=2;s.nami+=2;s.soraka+=2;s.taric+=2;s.renataGlasc+=2;}
    if(A[6]==='vision'){s.thresh+=2;s.milio+=2;s.bard+=2;s.senna+=1;}
    if(A[6]==='engage'){s.nautilus+=2;s.thresh+=2;s.blitzcrank+=1;s.leona+=3;s.rakan+=2;s.rell+=2;}
    if(A[7]==='playmaker'){s.thresh+=3;s.pyke+=2;s.blitzcrank+=1;s.rakan+=2;s.bard+=1;}
    if(A[7]==='protector'){s.braum+=3;s.lulu+=2;s.nami+=2;s.soraka+=2;s.yuumi+=2;s.taric+=2;}
    if(A[7]==='strategist'){s.milio+=3;s.thresh+=2;s.nami+=1;s.bard+=2;s.zilean+=2;}
    if(A[7]==='semicarry'){s.pyke+=3;s.thresh+=1;s.xerath+=2;s.senna+=2;}
    if(A[8]==='roam'){s.pyke+=3;s.bard+=3;s.thresh+=2;s.senna+=2;}
    if(A[8]==='stay'){s.lulu+=2;s.braum+=2;s.nami+=2;s.soraka+=2;s.yuumi+=3;}
    if(A[8]==='flex'){s.milio+=2;s.nautilus+=1;s.sona+=2;s.morgana+=1;}
    if(A[9]==='lead'){s.thresh+=2;s.leona+=3;s.blitzcrank+=2;s.rakan+=2;}
    if(A[9]==='guard'){s.braum+=3;s.lulu+=2;s.soraka+=2;s.taric+=2;s.yuumi+=2;}
    if(A[9]==='vision'){s.milio+=3;s.bard+=3;s.thresh+=1;s.zilean+=2;}
    if(A[9]==='target'){s.nautilus+=2;s.morgana+=3;s.thresh+=1;s.pyke+=2;}
    return Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
  }
};

// ============================================================
// ROLE MAP & CONTROLLER
// ============================================================


var ROLES = {top:TOP, jg:JG, mid:MID, bot:BOT, sup:SUP};
var curRole = null;
var curQ = 0;
var ans = [];

function startRole(role) {
  curRole = role;
  curQ = 0;
  ans = [];
  var D = ROLES[role];

  // バッジ
  var badge = document.getElementById('qbadge');
  badge.textContent = D.label;
  badge.style.color = D.color;
  badge.style.borderColor = D.color;

  // 質問カード生成
  var wrap = document.getElementById('qwrap');
  wrap.innerHTML = '';

  for (var i = 0; i < D.qs.length; i++) {
    var q = D.qs[i];
    var card = document.createElement('div');
    card.id = 'q' + i;
    card.className = 'qcard';
    card.style.display = i === 0 ? 'block' : 'none';

    var num = document.createElement('div');
    num.className = 'qnum';
    num.textContent = 'QUESTION ' + ('0' + (i + 1)).slice(-2) + ' / ' + D.qs.length;
    card.appendChild(num);

    var txt = document.createElement('div');
    txt.className = 'qtxt';
    txt.textContent = q.q;
    card.appendChild(txt);

    var opts = document.createElement('div');
    opts.className = 'opts';

    for (var j = 0; j < q.o.length; j++) {
      (function(qi, opt) {
        var btn = document.createElement('button');
        btn.className = 'opt';

        var em = document.createElement('span');
        em.className = 'opt-e';
        em.textContent = opt.e;
        btn.appendChild(em);

        var sp = document.createElement('span');
        sp.textContent = opt.t;
        btn.appendChild(sp);

        btn.addEventListener('click', function() {
          selectAnswer(qi, opt.v, btn);
        });
        opts.appendChild(btn);
      })(i, q.o[j]);
    }

    card.appendChild(opts);
    wrap.appendChild(card);
  }

  // 画面切り替え
  document.getElementById('s-role').style.display = 'none';
  document.getElementById('s-res').style.display = 'none';
  document.getElementById('s-quiz').style.display = 'block';

  updateProgress(0, D.qs.length);
}

function selectAnswer(qi, val, btn) {
  ans[qi] = val;

  // 選択肢を全部無効化
  var allBtns = document.getElementById('q' + qi).querySelectorAll('.opt');
  for (var i = 0; i < allBtns.length; i++) {
    allBtns[i].disabled = true;
  }
  btn.classList.add('sel');

  var total = ROLES[curRole].qs.length;

  setTimeout(function() {
    document.getElementById('q' + qi).style.display = 'none';

    if (qi < total - 1) {
      var nextQ = qi + 1;
      document.getElementById('q' + nextQ).style.display = 'block';
      updateProgress(nextQ, total);
    } else {
      updateProgress(total, total);
      showResult();
    }
  }, 280);
}

function updateProgress(cur, total) {
  var pct = Math.round(cur / total * 100);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('plbl').textContent = cur >= total ? 'COMPLETE' : 'Q' + (cur + 1) + '/' + total;
  document.getElementById('ppct').textContent = pct + '%';
}

function showResult() {
  var D = ROLES[curRole];
  var key = D.calc(ans);
  var R = D.ch[key];

  // fallback
  if (!R) {
    var keys = Object.keys(D.ch);
    R = D.ch[keys[0]];
  }

  document.getElementById('rname').textContent = R.name;
  document.getElementById('rarch').textContent = R.arch;

  var statsHtml = '';
  for (var i = 0; i < R.st.length; i++) {
    statsHtml += '<div class="scell"><span class="sv">' + R.st[i].v + '</span><span class="sk">' + R.st[i].k + '</span></div>';
  }
  document.getElementById('rstats').innerHTML = statsHtml;

  var picksHtml = '';
  for (var i = 0; i < R.picks.length; i++) {
    var p = R.picks[i];
    var tagsHtml = '';
    for (var j = 0; j < p.tags.length; j++) {
      tagsHtml += '<span class="ptag">' + p.tags[j] + '</span>';
    }
    picksHtml += '<div class="pick' + (i === 0 ? ' top' : '') + '">';
    picksHtml += '<div class="pname">' + p.name + '</div>';
    picksHtml += '<div class="pdesc">' + p.desc + '</div>';
    picksHtml += '<div class="ptags">' + tagsHtml + '</div>';
    picksHtml += '</div>';
  }
  document.getElementById('rpicks').innerHTML = picksHtml;
  document.getElementById('rcomment').textContent = R.comment;

  document.getElementById('s-quiz').style.display = 'none';
  document.getElementById('s-res').style.display = 'block';
}

function retryQuiz() {
  document.getElementById('s-res').style.display = 'none';
  startRole(curRole);
}

function goTop() {
  document.getElementById('s-res').style.display = 'none';
  document.getElementById('s-quiz').style.display = 'none';
  document.getElementById('s-role').style.display = 'block';
  curRole = null;
  ans = [];
}

// ── イベントバインド ──
document.getElementById('btn-top').addEventListener('click', function() { startRole('top'); });
document.getElementById('btn-jg').addEventListener('click',  function() { startRole('jg'); });
document.getElementById('btn-mid').addEventListener('click', function() { startRole('mid'); });
document.getElementById('btn-bot').addEventListener('click', function() { startRole('bot'); });
document.getElementById('btn-sup').addEventListener('click', function() { startRole('sup'); });
document.getElementById('btn-retry').addEventListener('click', retryQuiz);
document.getElementById('btn-top2').addEventListener('click', goTop);
</script>
